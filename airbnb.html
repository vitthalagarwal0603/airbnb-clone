/* ════════════════════════════════════════
   OFFER TICKER BAR
════════════════════════════════════════ */
.ticker-wrap {
  width: 100%;
  background: linear-gradient(90deg, #1a1a2e 0%, #0f3460 50%, #1a1a2e 100%);
  overflow: hidden;
  height: 44px;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 300;
  box-shadow: 0 2px 14px rgba(0,0,0,.35);
}
/* shimmer strip along the top edge */
.ticker-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--red), #ffd700, var(--red), transparent);
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
/* left fade + label */
.ticker-label {
  flex-shrink: 0;
  background: var(--red);
  color: white;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 0 16px 0 20px;
  height: 100%;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 3;
  white-space: nowrap;
}
/* pointed right edge */
.ticker-label::after {
  content: '';
  position: absolute;
  right: -13px; top: 0; bottom: 0;
  border-left: 13px solid var(--red);
  border-top: 22px solid transparent;
  border-bottom: 22px solid transparent;
}
/* right fade mask */
.ticker-mask {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 90px;
  background: linear-gradient(270deg, #1a1a2e, transparent);
  z-index: 2;
  pointer-events: none;
}
.ticker-track {
  display: flex;
  animation: tickerScroll 42s linear infinite;
  will-change: transform;
  align-items: center;
  height: 100%;
  padding-left: 32px;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes tickerScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  color: rgba(255,255,255,.88);
  font-size: 13px;
  font-weight: 400;
  padding: 0 30px;
  height: 100%;
  cursor: default;
  transition: color .2s;
}
.ticker-item:hover { color: #fff; }
/* dot separator between items */
.ticker-item + .ticker-item::before {
  content: '✦';
  color: var(--red);
  font-size: 10px;
  margin-right: -14px;
  margin-left: -16px;
  opacity: .7;
}
.ti-icon { font-size: 15px; flex-shrink: 0; }
.ticker-item strong { color: #ffd700; font-weight: 600; }
.ti-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 9px;
  border-radius: 20px;
  margin-left: 2px;
  border: 1px solid;
}
.ti-pill.hot   { color: #ff8fa3; border-color: rgba(255,143,163,.45); background: rgba(255,56,92,.15); }
.ti-pill.gold  { color: #ffd700; border-color: rgba(255,215,0,.4);   background: rgba(255,215,0,.1);  }
.ti-pill.green { color: #6effa8; border-color: rgba(110,255,168,.4); background: rgba(110,255,168,.1);}
/* ════════════════════════════════════════
   END TICKER
════════════════════════════════════════ */

let mapObj=null,selLat=null,selLng=null,liked=new Set(),mode='text';

function stars(n){return Array.from({length:5},(_,i)=>`<span style="color:${i<Math.round(n)?'#ffb400':'#ddd'};font-size:12px">★</span>`).join('');}

function renderCards(data){
  const g=document.getElementById('grid');
  document.getElementById('count').textContent=data.length+' stay'+(data.length!==1?'s':'');
  if(!data.length){g.innerHTML=`<div class="empty"><div class="e">🔍</div><h3>No stays found</h3><p>Try adjusting your filters</p></div>`;return;}
  g.innerHTML=data.map((h,i)=>`
    <div class="card" style="animation:none;opacity:1" onclick="openModal(${h.id})">
      <div class="ciw">
        <img src="${h.img}" alt="${h.name}" loading="lazy">
        <div class="badge">${h.badge}</div>
        <button class="wb" onclick="event.stopPropagation();toggleLike(this,${h.id})">${liked.has(h.id)?'❤️':'🤍'}</button>
      </div>
      <div class="cb">
        <div class="ct"><div class="cn">${h.name}</div><div class="cr">★ ${h.rating}</div></div>
        <div class="cl">${h.loc}, ${h.state}</div>
        <div class="ci">Up to ${h.guests} guests · ${h.reviews} reviews</div>
        <div class="cf">
          <div class="cp"><strong>$${h.price}</strong><span>/night</span></div>
          <div class="ctag">${h.cat}</div>
        </div>
      </div>
    </div>`).join('');
}

function toggleLike(btn,id){
  liked.has(id)?(liked.delete(id),btn.textContent='🤍',showToast('Removed from wishlist')):(liked.add(id),btn.textContent='❤️',showToast('Saved to wishlist ❤️'));
}

function openModal(id){
  const h=H.find(x=>x.id===id);if(!h)return;
  document.getElementById('mg').innerHTML=`
    <div class="mg-m"><img src="${h.gallery[0]}" loading="lazy"></div>
    <div class="mg-s"><img src="${h.gallery[1]||h.gallery[0]}" loading="lazy"></div>
    <div class="mg-s"><img src="${h.gallery[2]||h.gallery[0]}" loading="lazy"></div>`;
  document.getElementById('mEy').textContent=`${h.loc} · ${h.state}`;
  document.getElementById('mTi').textContent=h.name;
  document.getElementById('mMe').innerHTML=`<span>${stars(h.rating)} <b>${h.rating}</b> (${h.reviews} reviews)</span><span>👥 Up to ${h.guests} guests</span><span>🏷 ${h.badge}</span>`;
  document.getElementById('mL').innerHTML=`
    <div class="hrow">
      <img src="${h.host.img}" alt="${h.host.name}">
      <div><div class="hn">Hosted by ${h.host.name}</div><div class="hm">Host since ${h.host.since}</div>${h.host.sup?'<div class="sh2">⭐ Superhost</div>':''}</div>
    </div>
    <div class="div"></div>
    <div class="mdesc">
      <p>${h.desc}</p>
      <h3>✦ What this place offers</h3>
      <div class="amen">${h.amenities.map(a=>`<div class="am">${a}</div>`).join('')}</div>
      <h3>✦ Highlights</h3>
      <ul style="padding-left:20px;margin-top:8px">${h.highlights.map(x=>`<li style="font-size:14px;color:#555;margin-bottom:8px">${x}</li>`).join('')}</ul>
      <h3>✦ Guest Reviews</h3>
      <div class="rl">${h.revs.map(r=>`
        <div class="rc">
          <div class="rt"><img src="${r.img}"><div><div class="rn">${r.name}</div><div class="rd">${r.date}</div></div></div>
          <div style="margin-bottom:6px">${stars(r.stars)}</div>
          <div class="rtxt">${r.text}</div>
        </div>`).join('')}
      </div>
    </div>`;
  const nights=3,fee=Math.round(h.price*.12),total=h.price*nights+fee;
  document.getElementById('mR').innerHTML=`
    <div class="bk">
      <div class="bp">$${h.price}<span> / night</span></div>
      <div class="bsub">${stars(h.rating)} ${h.rating} · ${h.reviews} reviews</div>
      <div class="bdates">
        <div class="bdf"><label>Check-in</label><input type="date"></div>
        <div class="bdf"><label>Check-out</label><input type="date"></div>
      </div>
      <div class="bg"><label>Guests</label><input type="number" min="1" max="${h.guests}" value="1"></div>
      <button class="bbtn" onclick="showToast('🎉 Booking request sent!')">Reserve Now</button>
      <div class="bnote">You won't be charged yet</div>
      <div class="div"></div>
      <div class="br"><span>$${h.price} × ${nights} nights</span><span>$${h.price*nights}</span></div>
      <div class="br"><span>Service fee</span><span>$${fee}</span></div>
      <div class="br total"><span>Total</span><span>$${total}</span></div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function doSearch(){
  const loc=document.getElementById('location').value.toLowerCase().trim();
  const g=parseInt(document.getElementById('guests').value);
  const pr=document.getElementById('priceRange').value;
  let mn=0,mx=Infinity;
  if(pr){const[a,b]=pr.split('-');mn=+a;mx=+b;}
  renderCards(H.filter(h=>{
    const mL=!loc||h.loc.toLowerCase().includes(loc)||h.state.toLowerCase().includes(loc);
    const mG=isNaN(g)||h.guests>=g;
    const mP=h.price>=mn&&h.price<=mx;
    if(mode==='map'&&selLat!==null)return Math.sqrt((h.lat-selLat)**2+(h.lng-selLng)**2)<5&&mG&&mP;
    return mL&&mG&&mP;
  }));
}

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el=document.getElementById('map');
  if(m==='map'){
    el.style.display='block';
    if(!mapObj){
      mapObj=L.map('map').setView([20.59,78.96],5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapObj);
      H.forEach(h=>{L.marker([h.lat,h.lng]).addTo(mapObj).bindPopup(`<b>${h.name}</b><br>${h.loc} — $${h.price}/night`).on('click',()=>openModal(h.id));});
      mapObj.on('click',e=>{selLat=e.latlng.lat;selLng=e.latlng.lng;showToast('📍 Location selected — hit Search!');});
    }
  } else {el.style.display='none';selLat=null;selLng=null;}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

renderCards(H);
</script>
</body>
</html>
